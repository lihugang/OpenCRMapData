name: Nightly railway extracts

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-railway
  cancel-in-progress: false

jobs:
  extract:
    name: Build and publish railway PBF files
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install tools
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y osmium-tool jq
          osmium --version
          jq --version
          gh --version

      - name: Extract railway route relations
        shell: bash
        run: |
          set -Eeuo pipefail

          mkdir -p downloads work out

          download_file() {
            local url="$1"
            local dest="$2"

            echo "::group::Download ${url}"
            curl \
              --fail \
              --location \
              --retry 5 \
              --retry-delay 20 \
              --retry-all-errors \
              --connect-timeout 30 \
              --output "${dest}" \
              "${url}"
            echo "::endgroup::"
          }

          extract_railway_relations() {
            local slug="$1"
            local url="$2"
            local output="$3"
            local source="downloads/${slug}.osm.pbf"
            local route_relations="work/${slug}-type-route.osm.pbf"
            local railway_relations="work/${slug}-route-railway.osm.pbf"
            local allowed_network_relations="work/${slug}-allowed-network.osm.pbf"
            local missing_network_relations="work/${slug}-missing-network.osm.pbf"

            download_file "${url}" "${source}"

            echo "::group::Extract ${output}"
            osmium tags-filter --progress -R -O -o "${route_relations}" "${source}" r/type=route
            osmium tags-filter --progress -R -O -o "${railway_relations}" "${route_relations}" r/route=railway
            osmium tags-filter --progress -R -O -o "${allowed_network_relations}" "${railway_relations}" 'r/network=中国铁路,台灣高鐵,臺鐵'
            osmium tags-filter --progress -R -i -O -o "${missing_network_relations}" "${railway_relations}" r/network
            osmium getid --progress -r -O -o "${output}" \
              "${source}" \
              -I "${allowed_network_relations}" \
              -I "${missing_network_relations}"
            osmium fileinfo "${output}"
            rm -f \
              "${source}" \
              "${route_relations}" \
              "${railway_relations}" \
              "${allowed_network_relations}" \
              "${missing_network_relations}"
            echo "::endgroup::"
          }

          extract_railway_relations \
            "china-source" \
            "https://download.geofabrik.de/asia/china-latest.osm.pbf" \
            "work/railway-china-source.osm.pbf"

          regions=(
            "anhui|https://download.geofabrik.de/asia/china/anhui-latest.osm.pbf"
            "beijing|https://download.geofabrik.de/asia/china/beijing-latest.osm.pbf"
            "chongqing|https://download.geofabrik.de/asia/china/chongqing-latest.osm.pbf"
            "fujian|https://download.geofabrik.de/asia/china/fujian-latest.osm.pbf"
            "gansu|https://download.geofabrik.de/asia/china/gansu-latest.osm.pbf"
            "guangdong|https://download.geofabrik.de/asia/china/guangdong-latest.osm.pbf"
            "guangxi|https://download.geofabrik.de/asia/china/guangxi-latest.osm.pbf"
            "guizhou|https://download.geofabrik.de/asia/china/guizhou-latest.osm.pbf"
            "hainan|https://download.geofabrik.de/asia/china/hainan-latest.osm.pbf"
            "hebei|https://download.geofabrik.de/asia/china/hebei-latest.osm.pbf"
            "heilongjiang|https://download.geofabrik.de/asia/china/heilongjiang-latest.osm.pbf"
            "henan|https://download.geofabrik.de/asia/china/henan-latest.osm.pbf"
            "hong-kong|https://download.geofabrik.de/asia/china/hong-kong-latest.osm.pbf"
            "hubei|https://download.geofabrik.de/asia/china/hubei-latest.osm.pbf"
            "hunan|https://download.geofabrik.de/asia/china/hunan-latest.osm.pbf"
            "inner-mongolia|https://download.geofabrik.de/asia/china/inner-mongolia-latest.osm.pbf"
            "jiangsu|https://download.geofabrik.de/asia/china/jiangsu-latest.osm.pbf"
            "jiangxi|https://download.geofabrik.de/asia/china/jiangxi-latest.osm.pbf"
            "jilin|https://download.geofabrik.de/asia/china/jilin-latest.osm.pbf"
            "liaoning|https://download.geofabrik.de/asia/china/liaoning-latest.osm.pbf"
            "macau|https://download.geofabrik.de/asia/china/macau-latest.osm.pbf"
            "ningxia|https://download.geofabrik.de/asia/china/ningxia-latest.osm.pbf"
            "qinghai|https://download.geofabrik.de/asia/china/qinghai-latest.osm.pbf"
            "shaanxi|https://download.geofabrik.de/asia/china/shaanxi-latest.osm.pbf"
            "shandong|https://download.geofabrik.de/asia/china/shandong-latest.osm.pbf"
            "shanghai|https://download.geofabrik.de/asia/china/shanghai-latest.osm.pbf"
            "shanxi|https://download.geofabrik.de/asia/china/shanxi-latest.osm.pbf"
            "sichuan|https://download.geofabrik.de/asia/china/sichuan-latest.osm.pbf"
            "tianjin|https://download.geofabrik.de/asia/china/tianjin-latest.osm.pbf"
            "tibet|https://download.geofabrik.de/asia/china/tibet-latest.osm.pbf"
            "xinjiang|https://download.geofabrik.de/asia/china/xinjiang-latest.osm.pbf"
            "yunnan|https://download.geofabrik.de/asia/china/yunnan-latest.osm.pbf"
            "zhejiang|https://download.geofabrik.de/asia/china/zhejiang-latest.osm.pbf"
            "taiwan|https://download.geofabrik.de/asia/taiwan-latest.osm.pbf"
          )

          for region in "${regions[@]}"; do
            IFS="|" read -r slug url <<< "${region}"
            extract_railway_relations \
              "china-${slug}" \
              "${url}" \
              "out/railway-china-${slug}.osm.pbf"
          done

          test -s "out/railway-china-taiwan.osm.pbf"

          echo "::group::Merge Taiwan into railway-china.osm.pbf"
          osmium merge \
            --progress \
            -O \
            -o "out/railway-china.osm.pbf" \
            "work/railway-china-source.osm.pbf" \
            "out/railway-china-taiwan.osm.pbf"
          osmium fileinfo "out/railway-china.osm.pbf"
          echo "::endgroup::"

          shopt -s nullglob
          assets=(out/railway-*.osm.pbf)
          if (( ${#assets[@]} == 0 )); then
            echo "No railway extract assets were produced." >&2
            exit 1
          fi

          echo "::group::Generate manifest.json"
          manifest_entries="work/manifest-files.jsonl"
          : > "${manifest_entries}"

          generated_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          for asset in "${assets[@]}"; do
            info_file="work/$(basename "${asset}").fileinfo.json"
            osmium fileinfo -e -j "${asset}" > "${info_file}"
            sha256="$(sha256sum "${asset}" | awk '{print $1}')"

            jq -c -n \
              --arg name "$(basename "${asset}")" \
              --arg path "${asset}" \
              --arg sha256 "${sha256}" \
              --slurpfile osmium_fileinfo "${info_file}" \
              '{
                name: $name,
                path: $path,
                sha256: $sha256,
                osmium_fileinfo: $osmium_fileinfo[0]
              }' >> "${manifest_entries}"
          done

          jq -s \
            --arg generated_at "${generated_at}" \
            --arg tag "nightly" \
            --arg source "Geofabrik OpenStreetMap extracts" \
            '{
              generated_at: $generated_at,
              tag: $tag,
              source: $source,
              files: .
            }' \
            "${manifest_entries}" > out/manifest.json

          jq . out/manifest.json >/dev/null
          test -s out/manifest.json
          echo "::endgroup::"

          printf "Produced %s assets:\n" "${#assets[@]}"
          printf " - %s\n" "${assets[@]}"
          printf " - %s\n" "out/manifest.json"

      - name: Upload nightly release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -Eeuo pipefail

          shopt -s nullglob
          assets=(out/railway-*.osm.pbf)
          if (( ${#assets[@]} == 0 )); then
            echo "No railway extract assets found for upload." >&2
            exit 1
          fi
          if [[ ! -s out/manifest.json ]]; then
            echo "No manifest.json found for upload." >&2
            exit 1
          fi
          assets+=(out/manifest.json)

          notes="Automatically generated railway route extracts from Geofabrik OpenStreetMap data."
          if gh release view nightly >/dev/null 2>&1; then
            gh release edit nightly \
              --title "Nightly railway extracts" \
              --notes "${notes}"
          else
            gh release create nightly \
              --target "${GITHUB_SHA}" \
              --title "Nightly railway extracts" \
              --notes "${notes}"
          fi

          gh release upload nightly "${assets[@]}" --clobber
